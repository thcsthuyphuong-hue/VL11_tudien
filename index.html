<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ai là triệu phú - Tụ điện</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- MathJax -->
<script>
window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body class="bg-gradient-to-r from-blue-900 to-black text-white p-4">

<h1 class="text-3xl font-bold text-yellow-400 mb-4 text-center">
AI LÀ TRIỆU PHÚ - TỤ ĐIỆN
</h1>

<!-- LOGIN -->
<div id="login">
    <input id="input-name" placeholder="Tên" class="text-black p-2 mb-2 w-full">
    <input id="input-sbd" placeholder="SBD" class="text-black p-2 mb-2 w-full">

    <button onclick="startGame()" class="bg-green-600 px-4 py-2 w-full">
        Bắt đầu
    </button>
</div>

<!-- GAME -->
<div id="game" class="hidden mt-4">
    <p id="question" class="text-xl mb-4"></p>
    <button onclick="endGame()" class="bg-red-600 px-4 py-2">
        Kết thúc
    </button>
</div>

<!-- ADMIN -->
<div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
    <div class="bg-white p-6 rounded text-black w-80">
        <h2 class="font-bold mb-3 text-center">ADMIN</h2>
        <input type="password" id="admin-password" class="border p-2 w-full mb-2">
        <button onclick="checkAdminPassword()" class="bg-blue-600 text-white w-full py-2">
            OK
        </button>
    </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDg4Q6rsrvPhY31oCpL4DAAjTKlgjJN1c0",
    authDomain: "khtn9-5c1f4.firebaseapp.com",
    projectId: "khtn9-5c1f4",
    storageBucket: "khtn9-5c1f4.firebasestorage.app",
    messagingSenderId: "498407772914",
    appId: "1:498407772914:web:6d07ae107a73d4b342366b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveResult = async function(data){
    try{
        await addDoc(collection(db,"results"), data);
        console.log("✅ Saved Firebase");
    }catch(e){
        console.error("❌ Firebase error:", e);
    }
}
</script>

<!-- GAME SCRIPT -->
<script>
let user = {};

function startGame(){
    const name = document.getElementById("input-name").value;
    const sbd = document.getElementById("input-sbd").value;

    if(!name || !sbd){
        alert("Vui lòng nhập đủ thông tin!");
        return;
    }

    user = {name, sbd};

    document.getElementById("login").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    document.getElementById("question").innerHTML = 
        "Câu hỏi demo: Công thức tụ điện là $Q = CU$ ?";
    
    if(window.MathJax) MathJax.typeset();
}

async function endGame(){
    await saveResult({
        name: user.name,
        sbd: user.sbd,
        score: (Math.random()*10).toFixed(1),
        time: new Date().toISOString()
    });

    alert("Đã lưu kết quả!");
}

function checkAdminPassword(){
    const pass = document.getElementById("admin-password").value;

    if(pass === "112233@@"){
        alert("Đăng nhập admin thành công!");
    }else{
        alert("Sai mật khẩu!");
    }
}
</script>

</body>
</html>
